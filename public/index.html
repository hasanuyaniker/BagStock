<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BagStock - Giriş</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5b3de8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BagStock">
  <link rel="apple-touch-icon" href="/api/settings/logo-img">
  <link rel="icon" type="image/png" href="/api/settings/logo-img">
  <link rel="shortcut icon" href="/api/settings/logo-img">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(ellipse 70% 55% at 0%   100%, rgba(22,52,180,0.80) 0%, transparent 100%),
        radial-gradient(ellipse 70% 55% at 50%  100%, rgba(110,20,160,0.75) 0%, transparent 100%),
        radial-gradient(ellipse 70% 55% at 100% 100%, rgba(155,15,40,0.80)  0%, transparent 100%),
        linear-gradient(170deg, #07070e 0%, #0d0d18 55%, #11101c 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(236, 232, 255, 0.96);
      border-radius: 20px;
      padding: 48px 40px;
      width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(124,58,237,0.15);
      text-align: center;
      backdrop-filter: blur(12px);
    }
    .logo-area {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #5b3de8 0%, #c026a8 100%);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #fff;
      box-shadow: 0 6px 20px rgba(192,38,168,0.45);
    }
    .logo-area img { width: 64px; height: 64px; object-fit: contain; border-radius: 10px; }
    h1 { font-size: 22px; font-weight: 800; color: #1a1f3e; margin-bottom: 6px; }
    .subtitle { color: #9498bb; font-size: 14px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { font-size: 12px; font-weight: 700; color: #4a5280; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input[type="text"] {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e2e4f0; border-radius: 10px;
      font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s;
      background: #fafafa; color: #1a1f3e;
    }
    .form-group input[type="text"]:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
      background: #fff;
    }
    .pin-label { font-size: 12px; font-weight: 700; color: #4a5280; margin-bottom: 10px; text-align: left; text-transform: uppercase; letter-spacing: 0.04em; }
    .pin-inputs { display: flex; gap: 12px; justify-content: center; margin-bottom: 28px; }
    .pin-inputs input {
      width: 58px; height: 58px; text-align: center; font-size: 24px; font-weight: 800;
      border: 2px solid #e2e4f0; border-radius: 14px; outline: none; background: #fafafa;
      color: #1a1f3e;
      transition: border-color .2s, box-shadow .2s;
      -moz-appearance: textfield;
    }
    .pin-inputs input::-webkit-outer-spin-button,
    .pin-inputs input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .pin-inputs input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
      background: #fff;
    }
    .pin-inputs input.error { border-color: #f43f5e; background: #fff5f5; }
    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #5b3de8 0%, #c026a8 100%);
      color: #fff; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 16px rgba(192,38,168,0.4);
    }
    .login-btn:hover {
      background: linear-gradient(135deg, #4930cc 0%, #a81e90 100%);
      box-shadow: 0 6px 22px rgba(192,38,168,0.55);
      transform: translateY(-1px);
    }
    .login-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .error-msg {
      color: #f43f5e; font-size: 13px; margin-top: 12px; min-height: 20px;
      font-weight: 500;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 50%, 90% { transform: translateX(-7px); }
      30%, 70% { transform: translateX(7px); }
    }
    .shake { animation: shake 0.5s ease-in-out; }
  </style>
</head>
<body>
  <div class="login-card" id="loginCard">
    <div class="logo-area" id="logoArea">ST</div>
    <h1>Stok Takip Sistemi</h1>
    <p class="subtitle">Hesabınıza giriş yapın</p>

    <div class="form-group">
      <label for="username">Kullanıcı Adı</label>
      <input type="text" id="username" placeholder="Kullanıcı adınızı girin" autocomplete="off">
    </div>

    <div class="pin-label">PIN Kodu</div>
    <div class="pin-inputs">
      <input type="password" inputmode="numeric" maxlength="1" class="pin-digit" data-index="0" autocomplete="off">
      <input type="password" inputmode="numeric" maxlength="1" class="pin-digit" data-index="1" autocomplete="off">
      <input type="password" inputmode="numeric" maxlength="1" class="pin-digit" data-index="2" autocomplete="off">
      <input type="password" inputmode="numeric" maxlength="1" class="pin-digit" data-index="3" autocomplete="off">
    </div>

    <button class="login-btn" id="loginBtn">Giriş Yap</button>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <script>
    // Zaten giriş yapılmışsa yönlendir
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }

    // Logo yükle (DB'den API ile)
    fetch('/api/settings/logo')
      .then(res => { if (res.ok) return res.json(); throw new Error(); })
      .then(data => {
        if (data && data.logo) {
          const logoArea = document.getElementById('logoArea');
          logoArea.innerHTML = `<img src="${data.logo}">`;
        }
      })
      .catch(() => {});

    const pinDigits = document.querySelectorAll('.pin-digit');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const loginCard = document.getElementById('loginCard');

    // PIN input navigasyonu
    pinDigits.forEach((input, i) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val.slice(-1);
        if (val && i < 3) {
          pinDigits[i + 1].focus();
        }
        if (i === 3 && val) {
          loginBtn.focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) {
          pinDigits[i - 1].focus();
          pinDigits[i - 1].value = '';
        }
        if (e.key === 'Enter') {
          doLogin();
        }
      });

      input.addEventListener('focus', () => {
        e => e.target.select();
      });
    });

    document.getElementById('username').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') pinDigits[0].focus();
    });

    loginBtn.addEventListener('click', doLogin);

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const pin = Array.from(pinDigits).map(d => d.value).join('');

      if (!username) {
        showError('Kullanıcı adını girin');
        return;
      }
      if (pin.length !== 4) {
        showError('4 haneli PIN kodunu girin');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Giriş yapılıyor...';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, pin })
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Giriş başarısız');
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } catch (err) {
        showError(err.message);
        loginCard.classList.add('shake');
        pinDigits.forEach(d => { d.value = ''; d.classList.add('error'); });
        pinDigits[0].focus();
        setTimeout(() => {
          loginCard.classList.remove('shake');
          pinDigits.forEach(d => d.classList.remove('error'));
        }, 600);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Giriş Yap';
      }
    }

    function showError(msg) {
      errorMsg.textContent = msg;
    }

    // Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
